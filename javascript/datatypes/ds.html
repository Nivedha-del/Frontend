<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // NUMBER

        let  PhoneNumber;
        PhoneNumber = 8870136706
        console.log( PhoneNumber);
        console.log(typeof  PhoneNumber);
        var AGE = 20
        console.log(typeof AGE);

        // STRING
        
        let Name;
        Name="Nivedha"
        console.log( Name);
        console.log(typeof  Name);
     
      // BOLEAN

        const val = true
        console.log(val)
        console.log(typeof val)

        // NULL

        const _value = null
        console.log(typeof _value);

        // UNDEFINED

        var age
        console.log(age);

        // UNDECLARED

        // console.log(value);

        // OBJECT

        const datas = {
           Name:"NIvedha",
           Email:"nivedha923@gmail.com",
           PhoneNumber:8056571019,
        }

        console.log(datas)
        console.log(typeof datas);

        // ARRAY

        var Names = ["Nivedha","Butti","Durga"]
        console.log(Names,"array Names");
        console.log(typeof Names , "array type");
        


        
    </script>
</body>
</html>
