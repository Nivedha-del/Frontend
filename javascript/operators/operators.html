<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        // ARITHMETIC OPERATORS

        let a = 10
        var b = 20

        console.log(a + b)
        console.log(20 - 30)
        console.log(a * b)
        console.log(a / b)
        console.log(a ** b)

        a++    //INCREMENT
        console.log(a)

        a--  //DECREMENT
        console.log(a)


        // ASSIGNMENT OPERATORS

        let x = 20, y = 10

        console.log(x)
        console.log(y)

        console.log(x += 10);
        console.log(y -= 10);
        console.log(x *= 10);
        console.log(y /= 10);


        //COMPARISON OPERATOR(TRUE/FALSE)

        console.log(3 == "4")
        console.log(3 == "3")

        console.log(3 != "3")
        console.log(3 != "4")

        console.log(3 === "3")
        console.log(3 === "4")

        console.log(3 !== "3")
        console.log(3 !== "4")

        console.log(10 < 20)
        console.log(10 > 20)

        console.log(10 <= 20)
        console.log(10 >= 20)


        // LOGICAL OPERATOR

        var m = 30, n = 40

        // AND

        console.log(m > 10 && n < 20);
        console.log(m > 10 && n > 20);

        // OR

        console.log(m > 10 || n < 20);
        console.log(m < 10 || n < 20);

        // NOT

        console.log(!(m > 10 && n < 20));
        console.log(!(m > 10 && n > 20));

    </script>
</body>

</html>
