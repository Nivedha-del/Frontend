<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        
         // 1.Check even or odd

         let a= 4

         var result=(a%2==0)? "even":"odd"
         console.log(result);

         // 2.  Check positive or negative

         var value=(a>0)? "+ve":"-ve"
         console.log(value);

          // 3.  Check eligible to vote

          let age=19

          var vote_validation=(age>=18)? "valid":"not valid"
          console.log(vote_validation);

            // 4.  Check divisible by 5

            var type=(a%5==0)? "divisible by 5" : "not divisible by 5"
            console.log(type);

            // 5.  Check divisible by 10

            var divby10=(a%10==0)? "divisible by 10": "not divisible by 10"
            console.log(divby10);
            
            
          
         
         
    </script>
</body>
</html>
