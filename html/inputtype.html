<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
</head>
<body>
    <label>Name:</label>
    <input type="text" placeholder="Enter a Name"><br><br>
    <label>Password:</label>
    <input type="password" placeholder="Password "><br><br>
    <label>Email:</label>
    <input type="email" placeholder= " Email "><br><br>
    <label>Mobile No:</label>
    <input type="number"><br><br>
    <label>DOB:</label>
    <input type="date"><br><br>
    <label>Date With Time:</label>
    <input type="datetime-local"><br><br>
    <label>Week:</label>
    <input type="week"><br><br>
    <label>Month:</label>
    <input type="month"><br><br>
    <label>Gender:</label>
    <input type="radio" name="Gender">Male
    <input type="radio" name="Gender">Female
    <input type="radio" name="Gender">Other<br><br>
    <label>Courses:</label>
    <input type="checkbox">HTML
    <input type="checkbox">CSS
    <input type="checkbox">JS<br><br>
    <input type="button" value="REGISTER">
    <button type="button">LOGIN</button><br><br>
    <input type="submit"><br><br>
    <select>
        <option selected disabled>Select items</option>
        <option>Item 1</option>
        <option>Item 2</option>
        <option>Item 3</option>
    </select><br><br>
    <input type="file"><br><br>
    <input type="file"multiple><br><br>
    <label>Address:</label>
    <textarea cols="17" rows="3"></textarea>


</body>
</html>
